# 御之旅 MVP — CI 驗證
# 部署由 Cloudflare Pages 官方 Git 整合自動處理（OAuth 連結 GitHub）
# 此 workflow 僅於 PR 時驗證 build 是否通過
name: CI Build Check

on:
  pull_request:
    branches: [main]

jobs:
  build-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build verification
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
          NEXT_PUBLIC_APP_URL: https://placeholder.pages.dev
          NEXT_PUBLIC_APP_NAME: 御之旅
